services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15
    container_name: annie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-annie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-annie_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-annie_db}
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-annie}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - annie-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis 缓存
  redis:
    image: redis:7
    container_name: annie-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - ./data/redis_data:/data
    ports:
      - "0.0.0.0:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - annie-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # MeiliSearch 搜索引擎
  meilisearch:
    image: getmeili/meilisearch:v1.3
    container_name: annie-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-your_meilisearch_key}
      MEILI_ENV: development
      MEILI_HTTP_PAYLOAD_SIZE_LIMIT: 100000000  # 100MB
    volumes:
      - ./data/meilisearch_data:/meili_data
    ports:
      - "0.0.0.0:7700:7700"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - annie-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  annie-network:
    driver: bridge
