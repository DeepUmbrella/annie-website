<h2>选择网站需要的功能模块</h2>
<p class="subtitle">你可以选择多个，点击选中/取消</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="home" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>首页介绍</h3>
      <p>产品概述、核心卖点、引导用户开始使用</p>
    </div>
  </div>
  
  <div class="option" data-choice="features" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>功能详情页</h3>
      <p>详细介绍 Annie 的各项功能和使用场景</p>
    </div>
  </div>
  
  <div class="option" data-choice="docs" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>开发者文档</h3>
      <p>API 文档、集成指南、示例代码（面向开发者）</p>
    </div>
  </div>
  
  <div class="=" data-choice="demo" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>在线演示/试用</h3>
      <p>让用户可以直接在网站上体验 Annie 的对话功能</p>
    </div>
  </div>
  
  <div class="option" data-choice="pricing" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>定价方案</h3>
      <p>展示不同套餐和价格，支持订阅购买</p>
    </div>
  </div>
  
  <div class="option" data-choice="blog" onclick="toggleSelect(this)">
    <div class="letter">F</div>
    <div class="content">
      <h3>博客/新闻</h3>
      <p>产品更新、技术文章、使用技巧等内容</p>
    </div>
  </div>
  
  <div class="option" data-choice="contact" onclick="toggleSelect(this)">
    <div class="letter">G</div>
    <div class="content">
      <h3>联系我们</h3>
      <p>联系方式、反馈表单、FAQ 常见问题</p>
    </div>
  </div>
</div>
