<h2>你希望 Annie 的网站呈现什么风格？</h2>
<p class="subtitle">这将影响整体的设计语言和用户体验</p>

<div class="options">
  <div class="option" data-choice="modern-minimal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>现代极简</h3>
      <p>干净清爽，白色背景为主，强调内容本身。适合展示技术专业性和可信赖感。</p>
    </div>
  </div>
  
  <div class="option" data-choice="tech-future" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>科技未来感</h3>
      <p>深色主题，渐变色彩，动态效果。突显 AI 助手的前沿科技属性。</p>
    </div>
  </div>
  
  <div class="option" data-choice="warm-friendly" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>温暖友好</h3>
      <p>柔和色调，圆润元素，人性化设计。强调 AI 助手的亲和力和易用性。</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="label">参考案例</p>
  <ul style="margin-left: 20px; line-height: 1.8;">
    <li><strong>现代极简：</strong> 类似 Stripe、Linear 的设计风格</li>
    <li><strong>科技未来感：</strong> 类似 OpenAI、Anthropic 的设计风格</li>
    <li><strong>温暖友好：</strong> 类拟 Duolingo、Notion 的设计风格</li>
  </ul>
</div>
